<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-left"></div>
  <div class="bg-shape bg-shape-right"></div>

  <main class="panel">
    <header class="panel-header">
      <h1>Bot Mission Control</h1>
      <p>Start, stop, restart, and watch live process logs.</p>
    </header>

    <section class="status-grid">
      <div class="card">
        <h2>Status</h2>
        <p id="statusText" class="status idle">Loading...</p>
      </div>
      <div class="card">
        <h2>PID</h2>
        <p id="pidText">-</p>
      </div>
      <div class="card">
        <h2>Uptime</h2>
        <p id="uptimeText">0s</p>
      </div>
      <div class="card">
        <h2>Exit Code</h2>
        <p id="exitCodeText">-</p>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="btn btn-start">Start</button>
      <button id="stopBtn" class="btn btn-stop">Stop</button>
      <button id="restartBtn" class="btn btn-restart">Restart</button>
      <button id="clearLogsBtn" class="btn btn-clear">Clear Logs</button>
      <button id="refreshBtn" class="btn btn-refresh">Refresh</button>
    </section>

    <section class="logs card">
      <div class="logs-header">
        <h2>Logs</h2>
        <small id="lastUpdated">never</small>
      </div>
      <pre id="logsView">Waiting for logs...</pre>
    </section>

    <p id="messageBar" class="message"></p>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
